services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --mode=dev-container
    ports:
      - "9092:9092"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda-init:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./topicctl/topics:/topics:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        for f in /topics/*.yaml; do
          name=$$(grep -A1 '^meta:' "$$f" | grep 'name:' | awk '{print $$2}')
          partitions=$$(grep -A2 '^spec:' "$$f" | grep 'partitions:' | awk '{print $$2}')
          rpk topic create "$$name" -p "$${partitions:-1}" --brokers redpanda:29092 || true
        done

  redpanda-console:
    image: redpandadata/console:latest
    ports:
      - "8880:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: devMasterKey123456
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/media-public &&
      mc mb --ignore-existing local/media-public-temp &&
      mc anonymous set download local/media-public
      "

  imgproxy:
    image: darthsim/imgproxy:latest
    environment:
      IMGPROXY_KEY: 52cf861eb25d56e6a93f8964368d4cc6a9978eb417d79023074508bab67f8ac0
      IMGPROXY_SALT: 7d043fe44cc7034e062c90b15fdb29a02efa4582501cbbd6439fd76b1f25bc72
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      IMGPROXY_MAX_SRC_RESOLUTION: 150
      IMGPROXY_MAX_SRC_FILE_SIZE: 20971520
    ports:
      - "8083:8080"
    depends_on:
      minio:
        condition: service_healthy

  bull-board:
    image: deadly0/bull-board
    ports:
      - "3100:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

  gorse-redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    volumes:
      - gorse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gorse:
    image: zhenghaoz/gorse-in-one:0.5.5
    environment:
      GORSE_CACHE_STORE: redis://gorse-redis:6379/0
      GORSE_DATA_STORE: sqlite:///var/lib/gorse/data.db
    ports:
      - "8088:8088"
    volumes:
      - ./gorse-config.toml:/etc/gorse/config.toml
      - gorse_data:/var/lib/gorse
    depends_on:
      gorse-redis:
        condition: service_healthy

  # === Observability stack ===

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: [monitoring]
    volumes:
      - ./docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      prometheus:
        condition: service_started

  tempo:
    image: grafana/tempo:latest
    profiles: [monitoring]
    volumes:
      - ./docker/tempo.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:latest
    profiles: [monitoring]
    volumes:
      - ./docker/loki.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3101:3100"

  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    volumes:
      - ./docker/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    volumes:
      - ./docker/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./docker/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./docker/grafana/json:/etc/grafana/provisioning/dashboards/json
      - grafana_data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3300:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  file-processor:
    build:
      context: .
      dockerfile: docker/file-processor.Dockerfile
    env_file: .env.development
    environment:
      DB_URL: postgres://devuser:devpassword@postgres:5432/devdb
      KAFKA_BROKER: redpanda:29092
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ./:/app
      - file_processor_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  meili_data:
  minio_data:
  gorse_data:
  gorse_redis_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
  file_processor_node_modules:
