[server]
http_port = 8088

[recommend]
positive_feedback_types = ["like", "purchase", "booking"]
read_feedback_types = ["view", "click"]

[recommend.collaborative]
model_fit_period = "10s"
model_search_period = "60s"
enable_index = false

[recommend.offline]
check_recommend_period = "10s"
refresh_recommend_period = "1s"

[[recommend.non-personalized]]
name = "popular"
score = "count(feedback, .FeedbackType == 'like')"
filter = ""

[[recommend.non-personalized]]
name = "latest"
score = "item.Timestamp.Unix()"
filter = ""
