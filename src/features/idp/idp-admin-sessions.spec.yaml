feature: IDP Admin Sessions
code: idp-admin-sessions
description: |
  Админское управление сессиями произвольного пользователя.

  Доступно владельцам права SESSION.MANAGE=all (по умолчанию — ADMIN).
  Позволяет посмотреть активные сессии пользователя, удалить конкретную
  сессию или сбросить все сессии разом. Удаление сессии немедленно
  инвалидирует соответствующий access-токен.

specs-unit:
  # ==================== ЛИСТИНГ ====================

  GET /admin/users/:userId/sessions:
    - assert: Возвращает сессии пользователя
      description: |
        Возвращает массив sessions с id/createdAt/expiresAt — у только что
        зарегистрированного пользователя ровно одна активная сессия.
    - assert: Возвращает пустой массив для пользователя без активных сессий
      description: |
        Для несуществующего/без сессий пользователя — пустой массив,
        не 404.
    - assert: Без авторизации — 401
    - assert: Без права SESSION.MANAGE=all — 403
      description: |
        Обычный пользователь (SESSION.MANAGE=self) не может смотреть
        чужие сессии — 403.

  # ==================== УДАЛЕНИЕ ОДНОЙ ====================

  DELETE /admin/users/:userId/sessions/:sessionId:
    - assert: Удаляет конкретную сессию
      description: |
        После удаления сессии её больше нет в списке /admin/users/:id/sessions.
    - assert: Инвалидирует токен пользователя после удаления сессии
      description: |
        Access-токен удалённой сессии перестаёт работать — /me
        возвращает 401.
    - assert: Обычному пользователю — 403
      description: Без SESSION.MANAGE=all — 403.

  # ==================== УДАЛЕНИЕ ВСЕХ ====================

  DELETE /admin/users/:userId/sessions:
    - assert: Удаляет все сессии пользователя
      description: |
        Сбрасывает все активные сессии пользователя — последующий GET
        возвращает пустой массив.
    - assert: Инвалидирует токен пользователя после удаления всех сессий
      description: |
        Все access-токены пользователя перестают работать сразу после
        вызова — /me возвращает 401.
    - assert: Возвращает 204, даже если у пользователя нет сессий
      description: |
        Идемпотентность: для пользователя без сессий — 204, не 404.
    - assert: Обычному пользователю — 403
      description: Без SESSION.MANAGE=all — 403.

