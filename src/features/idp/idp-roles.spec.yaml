feature: IDP Roles
code: idp-roles
description: |
  CRUD ролей и назначение ролей пользователям.

  Роли бывают статическими (ADMIN, USER — создаются seed'ом, нельзя
  редактировать/удалить) и кастомными. У каждой роли есть permissions —
  массив строковых идентификаторов прав (например role.read,
  cms.category.update, ticket.markDone). Каталог известных прав отдаётся
  через GET /roles/permissions-schema.

  Назначение роли пользователю инвалидирует его сессии (потребуется
  re-login для применения новых прав).

  Удаление роли требует replacementRoleId — все пользователи с
  удаляемой ролью переезжают на роль-замену.

specs-unit:
  # ==================== СПИСОК ====================

  GET /roles:
    - assert: Возвращает список ролей админу
      description: |
        Возвращает массив roles. Гарантированно содержит статические
        роли ADMIN и USER (seed).
    - assert: Без авторизации — 401
    - assert: Без права manageRole — 403
      description: Обычному пользователю — 403.

  # ==================== СХЕМА ПРАВ ====================

  GET /roles/permissions-schema:
    - assert: Возвращает схему прав
      description: |
        Возвращает { groups: PermissionGroup[] }, каждая группа содержит
        id, title и массив permissions ({ id, title, description }).
        Используется UI для построения формы редактирования роли.

  # ==================== ОДНА РОЛЬ ====================

  GET /roles/:roleId:
    - assert: Возвращает роль по ID
      description: |
        Возвращает роль с полями id/name/isStatic/permissions/createdAt/updatedAt.
    - assert: Несуществующая роль — 404

  # ==================== СОЗДАНИЕ ====================

  POST /roles:
    - assert: Создаёт новую роль
      description: |
        Создаёт кастомную роль (isStatic=false) с указанным name и permissions.
        Возвращает 201 + созданную роль с id/createdAt.
    - assert: Дублирующее имя роли — 400
      description: |
        Имя роли уникально — повторное создание возвращает 400,
        body.type=role_already_exists.

  # ==================== ВАЛИДАЦИЯ ПРАВ ====================

  Permission validation:
    - assert: Создание роли с неизвестным правом — 400
      description: |
        Неизвестный идентификатор права — 400, body.type=invalid_permissions,
        в data.errors есть "Unknown permission: <id>".
    - assert: Возвращает 400 со списком всех ошибок при нескольких невалидных правах
      description: |
        Все ошибки валидации возвращаются разом, а не по первой —
        в data.errors массив длины N.
    - assert: Обновление роли с невалидными правами — 400
      description: |
        Та же валидация работает на PATCH /roles/:roleId.
    - assert: Создаёт роль с корректным набором прав
      description: |
        Массив известных идентификаторов прав принимается — 201.
        Дубликаты в массиве дедуплицируются.

  # ==================== СЦЕНАРИЙ КАСТОМНОЙ РОЛИ ====================

  Custom role permissions flow:
    - assert: Применяет права кастомной роли к назначенному пользователю
      description: |
        После создания роли с конкретным набором прав, назначения её
        пользователю и re-login (старая сессия инвалидируется),
        /me/permissions у пользователя отражает заданные права; ключи,
        не указанные в permissions роли, остаются на дефолтах из схемы.
    - assert: Отражает изменения прав после обновления роли
      description: |
        Изменение permissions у роли применяется к её пользователям после
        re-login — /me/permissions показывает новые значения.

  # ==================== ОБНОВЛЕНИЕ ====================

  PATCH /roles/:roleId:
    - assert: Обновляет права роли
      description: Обновление permissions у кастомной роли — 200.
    - assert: Несуществующая роль — 404
    - assert: Обновление статической роли — 403
      description: |
        Статическую роль (ADMIN/USER) редактировать нельзя — 403,
        body.type=static_role_modification.

  # ==================== УДАЛЕНИЕ ====================

  DELETE /roles/:roleId:
    - assert: Удаляет нестатическую роль
      description: |
        Удаление кастомной роли требует replacementRoleId. После удаления
        GET /roles/:id возвращает 404.
    - assert: Несуществующая роль — 404
    - assert: Удаление статической роли — 403
      description: |
        Статическую роль удалить нельзя — 403, body.type=static_role_modification.

  DELETE /roles/:roleId (reassignment):
    - assert: Переводит пользователей на роль-замену при удалении роли
      description: |
        Все пользователи с удаляемой ролью переводятся на replacementRoleId.
        Сама роль удаляется (последующий GET — 404).

  # ==================== НАЗНАЧЕНИЕ РОЛИ ПОЛЬЗОВАТЕЛЮ ====================

  PATCH /users/:userId/role:
    - assert: Обновляет роль пользователя
      description: Назначение роли пользователю — 200.
    - assert: Несуществующая роль — 404
    - assert: Инвалидирует сессии после смены роли
      description: |
        Смена роли инвалидирует все активные сессии пользователя —
        старые access-токены возвращают 401, нужен re-login.
    - assert: Без права ROLE.MANAGE — 403
      description: Без права ROLE.MANAGE — 403.

  # ==================== ПРАВА НА CRUD РОЛЕЙ ====================

  Permission checks:
    - assert: POST /roles обычному пользователю — 403
    - assert: PATCH /roles/:roleId обычному пользователю — 403
    - assert: DELETE /roles/:roleId обычному пользователю — 403

